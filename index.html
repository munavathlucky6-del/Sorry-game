<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Mounika ❤️</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ffd6e7,#ffeef5);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
text-align:center;
}

.card{
background:white;
padding:25px;
border-radius:20px;
width:90%;
max-width:400px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

img{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:5px solid pink;
}

h1{
color:#ff4d88;
}

button{
padding:12px 24px;
margin:10px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
}

#yes{
background:#ff4d88;
color:white;
}

#no{
background:#ddd;
position:relative;
}

#msg{
margin-top:20px;
font-size:20px;
color:#ff4d88;
font-weight:bold;
}
</style>

</head>

<body>

<div class="card">

<img src="mounika.jpg">

<h1>Hey Mounika ❤️</h1>

<p>
I'm really sorry. 🥺<br>
You mean everything to me.<br>
Will you forgive me?
</p>

<button id="yes" onclick="yes()">Yes 💖</button>

<button id="no" onmouseover="move()">No 😜</button>

<p id="msg"></p>

</div>

<script>

function yes(){
document.getElementById("msg").innerHTML="Yayyy!! ❤️ Thank you Mounika 🥹💖 I Love You So Much 🌹";
}

function move(){
let btn=document.getElementById("no");
btn.style.left=Math.random()*200-100+"px";
btn.style.top=Math.random()*150-75+"px";
}

</script>

</body>
</html>
